set default="0"
set timeout="3"

# ISO/Live boot uses these paths
menuentry "UltraDisplay OS (Live)" {
    linux /boot/vmlinuz boot=live root=live:LABEL=UltraDisplay toram quiet loglevel=3 console=tty1
    initrd /boot/initrd.img
}

menuentry "UltraDisplay OS (Install to Disk)" {
    linux /boot/vmlinuz root=/dev/sda2 rootwait console=tty1 quiet loglevel=3
}
