set default="0"
set timeout="5"

# Find the ISO root (since UEFI boots from a tiny FAT partition)
search --no-floppy --set=root --file /boot/vmlinuz

menuentry "UltraDisplay OS (Live RAM)" {
    echo "Loading Linux Kernel..."
    linux /boot/vmlinuz console=tty1 console=ttyS0,115200n8 earlyprintk=vga,keep loglevel=7
    echo "Loading Initramfs..."
    initrd /boot/initrd.img
}

menuentry "UltraDisplay OS (Install to Disk)" {
    echo "Loading Linux Kernel..."
    linux /boot/vmlinuz root=/dev/sda2 rootwait console=tty1 console=ttyS0,115200n8 earlyprintk=vga,keep loglevel=7
}
