image efi-part.vfat {
    vfat {
        file EFI/BOOT/BOOTX64.EFI {
            image = "grub-efi.efi"
        }
        file EFI/BOOT/grub.cfg {
            image = "grub.cfg"
        }
        file bzImage {
            image = "bzImage"
        }
    }
    size = 128M
}

image sdcard.img {
    hdimage {
        gpt = true
    }

    partition boot {
        image = "efi-part.vfat"
        partition-type-uuid = c12a7328-f81f-11d2-ba4b-00a0c93ec93b
        bootable = true
    }

    partition rootfs-A {
        image = "rootfs.squashfs"
        partition-type-uuid = 0fc63daf-8483-4772-8e79-3d69d8477de4
        size = 256M
    }

    partition rootfs-B {
        # Initially empty, populated by OTA updater
        partition-type-uuid = 0fc63daf-8483-4772-8e79-3d69d8477de4
        size = 256M
    }

    partition data {
        partition-type-uuid = 0fc63daf-8483-4772-8e79-3d69d8477de4
        size = 512M
    }
}
