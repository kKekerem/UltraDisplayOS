set default="0"
set timeout="5"

# Load video drivers for UEFI
insmod all_video
insmod gfxterm
set gfxpayload=keep
terminal_output gfxterm

menuentry "UltraDisplay OS" {
  linux /bzImage root=/dev/ram0 rw quiet loglevel=3 console=tty1
  initrd /rootfs.cpio.xz
}

menuentry "UltraDisplay OS (Debug)" {
  linux /bzImage root=/dev/ram0 rw console=tty1 earlycon=efifb debug ignore_loglevel
  initrd /rootfs.cpio.xz
}
